<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solver NxN - LU y Cholesky</title>
<style>
body {
    font-family: Arial;
    text-align: center;
}
table {
    margin: auto;
    border-collapse: collapse;
}
td {
    padding: 5px;
}
input {
    width: 50px;
    text-align: center;
}
canvas {
    border: 1px solid black;
    margin-top: 20px;
}
</style>
</head>
<body>

<h2>Resolución de Sistemas NxN</h2>

<label>Tamaño (n ≤ 6): </label>
<select id="size" onchange="crearTabla()">
<option>2</option>
<option>3</option>
<option selected>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<br><br>

<label>Método:</label>
<select id="metodo">
<option value="doolittle">LU - Doolittle</option>
<option value="crout">LU - Crout</option>
<option value="cholesky">Cholesky</option>
</select>

<br><br>

<div id="matriz"></div>

<br>
<button onclick="resolver()">Resolver</button>

<canvas id="canvas" width="600" height="400"></canvas>

<script>
function crearTabla() {
    let n = parseInt(document.getElementById("size").value);
    let html = "<table>";

    for (let i = 0; i < n; i++) {
        html += "<tr>";
        for (let j = 0; j < n; j++) {
            html += `<td><input id="a${i}${j}" value="0"></td>`;
        }
        html += `<td>|</td><td><input id="b${i}" value="0"></td>`;
        html += "</tr>";
    }

    html += "</table>";
    document.getElementById("matriz").innerHTML = html;
}

function getDatos() {
    let n = parseInt(document.getElementById("size").value);
    let A = [], b = [];

    for (let i = 0; i < n; i++) {
        A[i] = [];
        for (let j = 0; j < n; j++) {
            A[i][j] = parseFloat(document.getElementById(`a${i}${j}`).value);
        }
        b[i] = parseFloat(document.getElementById(`b${i}`).value);
    }

    return {A, b, n};
}

// LU Doolittle
function doolittle(A, n) {
    let L = Array(n).fill().map(() => Array(n).fill(0));
    let U = Array(n).fill().map(() => Array(n).fill(0));

    for (let i = 0; i < n; i++) {
        L[i][i] = 1;
    }

    for (let j = 0; j < n; j++) {
        for (let i = 0; i <= j; i++) {
            let sum = 0;
            for (let k = 0; k < i; k++) sum += L[i][k]*U[k][j];
            U[i][j] = A[i][j] - sum;
        }

        for (let i = j+1; i < n; i++) {
            let sum = 0;
            for (let k = 0; k < j; k++) sum += L[i][k]*U[k][j];
            L[i][j] = (A[i][j] - sum) / U[j][j];
        }
    }

    return {L, U};
}

// LU Crout
function crout(A, n) {
    let L = Array(n).fill().map(() => Array(n).fill(0));
    let U = Array(n).fill().map(() => Array(n).fill(0));

    for (let j = 0; j < n; j++) {
        U[j][j] = 1;

        for (let i = j; i < n; i++) {
            let sum = 0;
            for (let k = 0; k < j; k++) sum += L[i][k]*U[k][j];
            L[i][j] = A[i][j] - sum;
        }

        for (let i = j+1; i < n; i++) {
            let sum = 0;
            for (let k = 0; k < j; k++) sum += L[j][k]*U[k][i];
            U[j][i] = (A[j][i] - sum) / L[j][j];
        }
    }

    return {L, U};
}

// Cholesky
function cholesky(A, n) {
    let L = Array(n).fill().map(() => Array(n).fill(0));

    for (let i = 0; i < n; i++) {
        for (let j = 0; j <= i; j++) {
            let sum = 0;
            for (let k = 0; k < j; k++) sum += L[i][k]*L[j][k];

            if (i === j) {
                L[i][j] = Math.sqrt(A[i][i] - sum);
            } else {
                L[i][j] = (A[i][j] - sum) / L[j][j];
            }
        }
    }

    return {L, U: transpose(L)};
}

function transpose(M) {
    return M[0].map((_, i) => M.map(row => row[i]));
}

// Resolver sistema
function resolverSistema(L, U, b) {
    let n = b.length;
    let y = Array(n).fill(0);
    let x = Array(n).fill(0);

    // Ly = b
    for (let i = 0; i < n; i++) {
        let sum = 0;
        for (let j = 0; j < i; j++) sum += L[i][j]*y[j];
        y[i] = (b[i] - sum) / L[i][i];
    }

    // Ux = y
    for (let i = n-1; i >= 0; i--) {
        let sum = 0;
        for (let j = i+1; j < n; j++) sum += U[i][j]*x[j];
        x[i] = (y[i] - sum) / U[i][i];
    }

    return x;
}

// Dibujar en canvas
function dibujar(L, U, x) {
    let c = document.getElementById("canvas");
    let ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);

    ctx.font = "14px Arial";

    ctx.fillText("Matriz L:", 20, 20);
    dibujarMatriz(ctx, L, 20, 40);

    ctx.fillText("Matriz U:", 300, 20);
    dibujarMatriz(ctx, U, 300, 40);

    ctx.fillText("Solución:", 20, 250);
    for (let i = 0; i < x.length; i++) {
        ctx.fillText(`x${i+1} = ${x[i].toFixed(3)}`, 20, 270 + i*20);
    }
}

function dibujarMatriz(ctx, M, x, y) {
    for (let i = 0; i < M.length; i++) {
        for (let j = 0; j < M.length; j++) {
            ctx.fillText(M[i][j].toFixed(2), x + j*40, y + i*20);
        }
    }
}

// Ejecutar
function resolver() {
    let {A, b, n} = getDatos();
    let metodo = document.getElementById("metodo").value;

    let LU;

    if (metodo === "doolittle") LU = doolittle(A, n);
    else if (metodo === "crout") LU = crout(A, n);
    else LU = cholesky(A, n);

    let x = resolverSistema(LU.L, LU.U, b);
    dibujar(LU.L, LU.U, x);
}

// Inicial
crearTabla();
</script>

</body>
</html>
